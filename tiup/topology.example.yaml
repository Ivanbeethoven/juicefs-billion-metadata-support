global:
  user: tikv
  ssh_port: 22
  deploy_dir: /data/tikv-deploy
  data_dir: /data/tikv-data

server_configs:
  pd:
    replication.location-labels: ["zone", "host"]
    replication.max-replicas: 3
  tikv:
    storage.reserve-space: 200GiB
    raftstore.capacity: 3TiB

pd_servers:
  - host: 10.0.1.10
    name: pd-1
    client_port: 2379
    peer_port: 2380
  - host: 10.0.2.10
    name: pd-2
    client_port: 2379
    peer_port: 2380
  - host: 10.0.3.10
    name: pd-3
    client_port: 2379
    peer_port: 2380

tikv_servers:
  - host: 10.0.1.21
    port: 20160
    status_port: 20180
    config:
      server.labels:
        zone: az-a
        host: tikv-1
  - host: 10.0.2.21
    port: 20160
    status_port: 20180
    config:
      server.labels:
        zone: az-b
        host: tikv-2
  - host: 10.0.3.21
    port: 20160
    status_port: 20180
    config:
      server.labels:
        zone: az-c
        host: tikv-3

